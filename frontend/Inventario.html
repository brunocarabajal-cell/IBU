<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="ibu-api-base" content="">
<title>IBU - Inventario</title>
<link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/navbar.css">
<link rel="stylesheet" href="../css/button_styles.css">
<link rel="stylesheet" href="../css/select_styles.css">
<link rel="stylesheet" href="../css/input_text_styles.css">
<link rel="stylesheet" href="../css/input_date_styles.css">
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:'Lato',sans-serif}
body{background:#F4F4F8;color:#1A1A2E;padding-bottom:50px}
.page-shell{padding:30px}
.card{background:#fff;border-radius:18px;padding:26px 30px;box-shadow:0 10px 30px rgba(31,40,88,0.08);margin-bottom:28px}
.section-title{color:#4B4EFC;font-weight:700;font-size:16px}
.section-subtitle{margin-top:8px;color:#667099;font-size:14px;line-height:1.4}
.section-line{height:2px;background:#4B4EFC;margin:14px 0 22px;width:100%}
.create-form{display:grid;grid-template-columns:2fr 1.1fr 1fr 0.9fr 1fr auto;gap:18px;align-items:end}
.field{display:flex;flex-direction:column;gap:6px;font-size:12px}
.field label{color:#4B4EFC;font-weight:700}
.field .input-base,.field .select-wrapper,.field input[type="date"]{width:100%}
.field .input-base,.field .select-selected,input[type="date"]{height:40px !important}
.field-inline-end{display:flex;align-items:end;height:100%}
#btn-crear-container{display:flex;justify-content:center}
.helper-banner{margin-top:18px;padding:12px 16px;border-radius:12px;background:#F3F5FF;border:1px solid #D6DCFF;color:#44507F;font-size:14px}
.helper-banner.hidden{display:none}
.table-card{background:#DCDDE6}
table{width:100%;border-collapse:collapse}
th{color:#4B4EFC;font-size:13px;text-align:left;padding:14px 12px;border-bottom:2px solid #4B4EFC}
td{padding:14px 12px;border-top:1px solid #ECECF4;font-size:14px;vertical-align:top}
.sortable-head{display:inline-flex;align-items:center;gap:6px;background:none;border:none;color:inherit;font:inherit;font-weight:700;cursor:pointer;padding:0}
.sort-indicator{font-size:11px;opacity:.65;min-width:12px}
.empty-row td{text-align:center;color:#6D7396;padding:28px 12px}
.btn-ingresar{background:#2C3E6B;color:#fff;border:none;padding:8px 16px;border-radius:10px;cursor:pointer;font-weight:700}
.status-pill{display:inline-flex;align-items:center;justify-content:center;padding:6px 12px;border-radius:999px;font-weight:700;font-size:13px}
.status-pending{background:#FFF0D9;color:#A66700}
.status-expired{background:#FFE0DE;color:#B3261E}
.modal{position:fixed;inset:0;background:rgba(19,24,50,0.35);display:none;justify-content:center;align-items:center;padding:24px;z-index:200}
.modal-content{background:#fff;width:min(1280px,100%);max-height:92vh;overflow:auto;border-radius:20px;padding:26px 30px;box-shadow:0 24px 60px rgba(20,24,54,0.25)}
.modal-header{display:flex;justify-content:space-between;align-items:flex-start;gap:20px;margin-bottom:22px}
.modal-meta{display:grid;grid-template-columns:repeat(5,minmax(120px,1fr));gap:12px;flex:1}
.meta-card{padding:12px 14px;border-radius:14px;background:#F6F7FE;border:1px solid #DCE1FF}
.meta-card b{display:block;color:#4B4EFC;font-size:12px;margin-bottom:6px}
.modal-close{background:#EEF1FF;border:none;border-radius:12px;width:40px;height:40px;cursor:pointer;color:#2C3E6B;font-weight:700}
.detail-table-wrap{border:1px solid #E1E5F8;border-radius:16px;overflow:auto}
.detail-table th{white-space:nowrap}
.table-input{width:100%;border:1px solid #D9DEEF;border-radius:10px;padding:8px 10px;background:#fff;color:#1A1A2E}
.table-input-num{text-align:center}
.diff-value{text-align:center;font-weight:700}
.diff-pos{color:#2E7D32}
.diff-neg{color:#C62828}
.signatures{display:grid;grid-template-columns:repeat(4,minmax(180px,1fr));gap:18px;margin-top:22px}
.signature-field{display:flex;flex-direction:column;gap:8px;font-size:12px}
.signature-field label{color:#4B4EFC;font-weight:700}
.signature-field input{border:1px solid #D9DEEF;border-radius:12px;padding:10px 12px;height:42px}
.modal-actions{display:flex;justify-content:center;gap:18px;margin-top:24px}
.secondary-btn,.primary-btn{border:none;border-radius:12px;padding:12px 22px;cursor:pointer;font-weight:700}
.secondary-btn{background:#EEF1FF;color:#2C3E6B}
.primary-btn{background:#2C3E6B;color:#fff}
.danger-btn{background:#FCE8E6;color:#B3261E}
.secondary-btn:disabled,.primary-btn:disabled,.danger-btn:disabled{opacity:.45;cursor:not-allowed}
.footer-line{height:40px;background:#303D9F;width:100%;position:fixed;bottom:0;left:0}
@media (max-width: 1160px){
  .create-form{grid-template-columns:repeat(2,minmax(220px,1fr))}
  .field-inline-end{grid-column:1/-1;justify-content:center}
  .modal-meta{grid-template-columns:repeat(2,minmax(180px,1fr))}
  .signatures{grid-template-columns:repeat(2,minmax(180px,1fr))}
}
@media (max-width: 720px){
  .page-shell{padding:18px}
  .card{padding:20px}
  .create-form,.modal-meta,.signatures{grid-template-columns:1fr}
  .modal-content{padding:22px 18px}
  .modal-actions{flex-direction:column}
}
</style>
</head>
<body>

<div id="navbar-container"></div>

<div class="page-shell">
  <div class="card">
    <div class="section-title">Creación</div>
    <div class="section-line"></div>

    <div class="create-form">
      <div class="field">
        <label>Descripción</label>
        <div id="input-descripcion"></div>
      </div>

      <div class="field">
        <label>Ubicación</label>
        <div id="select-ubicacion"></div>
      </div>

      <div class="field">
        <label>Tipo</label>
        <div id="select-tipo"></div>
      </div>

      <div class="field">
        <label>Cantidad de Clases</label>
        <div id="input-clases"></div>
      </div>

      <div class="field">
        <label>Fecha</label>
        <div id="input-fecha"></div>
      </div>

      <div class="field-inline-end">
        <div id="btn-crear-container"></div>
      </div>
    </div>

    <div id="inventario-helper" class="helper-banner hidden"></div>
  </div>

  <div class="card table-card">
    <div class="section-title">Inventarios Pendientes</div>
    <div class="section-line"></div>

    <table id="tabla">
      <thead>
        <tr>
          <th><button class="sortable-head" onclick="ordenarInventarios('numeroInventario','number')">N° Inventario <span class="sort-indicator" id="sort-numeroInventario">↕</span></button></th>
          <th><button class="sortable-head" onclick="ordenarInventarios('fechaInventario','date')">Fecha <span class="sort-indicator" id="sort-fechaInventario">↕</span></button></th>
          <th><button class="sortable-head" onclick="ordenarInventarios('dias','number')">Días <span class="sort-indicator" id="sort-dias">↕</span></button></th>
          <th><button class="sortable-head" onclick="ordenarInventarios('descripcion','text')">Descripción <span class="sort-indicator" id="sort-descripcion">↕</span></button></th>
          <th><button class="sortable-head" onclick="ordenarInventarios('tipo','text')">Tipo <span class="sort-indicator" id="sort-tipo">↕</span></button></th>
          <th><button class="sortable-head" onclick="ordenarInventarios('ubicacion','text')">Ubicación <span class="sort-indicator" id="sort-ubicacion">↕</span></button></th>
          <th><button class="sortable-head" onclick="ordenarInventarios('cantidadClases','number')">Cant. Clases <span class="sort-indicator" id="sort-cantidadClases">↕</span></button></th>
          <th><button class="sortable-head" onclick="ordenarInventarios('estado','text')">Estado <span class="sort-indicator" id="sort-estado">↕</span></button></th>
          <th>Acción</th>
        </tr>
      </thead>
      <tbody>
        <tr class="empty-row"><td colspan="9">Cargando inventarios pendientes...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<div class="modal" id="modal">
  <div class="modal-content">
    <div class="modal-header">
      <div class="modal-meta">
        <div class="meta-card"><b>Fecha</b><span id="modal-fecha">-</span></div>
        <div class="meta-card"><b>N° Inventario</b><span id="modal-numero">-</span></div>
        <div class="meta-card"><b>Descripción</b><span id="modal-descripcion">-</span></div>
        <div class="meta-card"><b>Ubicación</b><span id="modal-ubicacion">-</span></div>
        <div class="meta-card"><b>Tipo</b><span id="modal-tipo">-</span></div>
      </div>
      <button class="modal-close" onclick="cerrarInventarioModal()" aria-label="Cerrar">X</button>
    </div>

    <div class="detail-table-wrap">
      <table class="detail-table">
        <thead>
          <tr>
            <th>N° Clase</th>
            <th>Descripción</th>
            <th>Teórico</th>
            <th>Físico Apto</th>
            <th>Físico No Apto</th>
            <th>Diferencia</th>
            <th>N° Baja</th>
            <th>N° Alta</th>
            <th>Observaciones</th>
          </tr>
        </thead>
        <tbody id="detalleBody"></tbody>
      </table>
    </div>

    <div class="signatures">
      <div class="signature-field">
        <label>Administrativo</label>
        <input id="firma-administrativo">
      </div>
      <div class="signature-field">
        <label>Participante 1</label>
        <input id="firma-p1">
      </div>
      <div class="signature-field">
        <label>Participante 2</label>
        <input id="firma-p2">
      </div>
      <div class="signature-field">
        <label>Gerencia</label>
        <input id="firma-gerencia">
      </div>
    </div>

    <div class="modal-actions">
      <button id="btn-cancelar-inventario" class="secondary-btn danger-btn" onclick="persistirInventario('cancelar')">Cancelar inventario</button>
      <button class="secondary-btn" onclick="persistirInventario('guardar')">Guardar borrador</button>
      <button id="btn-finalizar-inventario" class="primary-btn" onclick="persistirInventario('finalizar')">Finalizar inventario</button>
    </div>
  </div>
</div>

<div class="footer-line"></div>

<script src="../js/config.js"></script>
<script src="../js/button_principal.js"></script>
<script src="../js/select.js"></script>
<script src="../js/select_mult.js"></script>
<script src="../js/input_text.js"></script>
<script src="../js/input_date.js"></script>
<script src="../js/inventario_page.js"></script>
<script src="../js/navbar.js"></script>
<script>
  cargarUsuario('inventario');
  initInventarioPage();
</script>

</body>
</html>
