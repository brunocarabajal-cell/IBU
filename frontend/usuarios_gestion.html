<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Gestión de Usuarios</title>
  <style>
    body { font-family: Arial; background:#f5f6fa; margin:0; }
    h1 { text-align:center; margin:20px 0; }
    table { width:90%; margin:20px auto; border-collapse: collapse; background:white; border-radius:10px; overflow:hidden; }
    th, td { padding:12px; text-align:center; }
    th { background:#3f51b5; color:white; }
    tr:nth-child(even){ background:#f2f2f2; }
    button { padding:6px 10px; border:none; border-radius:6px; cursor:pointer; }
    .activar { background:#2e7d32; color:white; }
    .desactivar { background:#c62828; color:white; }
    .editar { background:#1565c0; color:white; margin-right:6px; }
    .modal {
      position: fixed; top:0; left:0; width:100%; height:100%;
      background: rgba(0,0,0,0.5); display:none; align-items:center; justify-content:center;
    }
    .modal-content {
      background:white; padding:20px; border-radius:10px; width:300px;
      display:flex; flex-direction:column; gap:10px;
    }
    .modal-content input { padding:8px; }
  </style>
</head>
<body>

<h1>Gestión de Usuarios</h1>

<table>
  <thead>
    <tr>
      <th>Legajo</th>
      <th>Nombre</th>
      <th>Perfil</th>
      <th>Ubicación</th>
      <th>Estado</th>
      <th>Acción</th>
    </tr>
  </thead>
  <tbody id="tablaUsuarios"></tbody>
</table>

<div id="modalEditar" class="modal">
  <div class="modal-content">
    <h3>Editar Usuario</h3>
    <input id="editNombre" placeholder="Nombre">
    <input id="editPuesto" placeholder="Perfil">
    <input id="editUbicacion" placeholder="Ubicación">
    <button onclick="guardarEdicion()">Guardar</button>
    <button onclick="cerrarModal()">Cancelar</button>
  </div>
</div>

<script>
async function cargarUsuarios() {
  const res = await fetch('http://127.0.0.1:3000/usuarios');
  const data = await res.json();

  const tabla = document.getElementById('tablaUsuarios');
  tabla.innerHTML = '';

  data.forEach(u => {
    tabla.innerHTML += `
      <tr>
        <td>${u.legajo}</td>
        <td>${u.nombre}</td>
        <td>${u.perfil}</td>
        <td>${u.ubicacion}</td>
        <td>${u.activo ? 'Activo' : 'Inactivo'}</td>
        <td>
          <button class="editar" onclick="abrirModal(${u.id}, '${u.nombre}', '${u.perfil}', '${u.ubicacion}')">Editar</button>
          ${u.activo
            ? `<button class="desactivar" onclick="desactivar(${u.id})">Desactivar</button>`
            : `<button class="activar" onclick="activar(${u.id})">Activar</button>`}
        </td>
      </tr>
    `;
  });
}

async function desactivar(id) {
  await fetch(`http://127.0.0.1:3000/usuarios/${id}/desactivar`, { method: 'PUT' });
  cargarUsuarios();
}

async function activar(id) {
  await fetch(`http://127.0.0.1:3000/usuarios/${id}/activar`, { method: 'PUT' });
  cargarUsuarios();
}

let usuarioEditando = null;

function abrirModal(id, nombre, puesto, ubicacion){
  usuarioEditando = id;
  document.getElementById('editNombre').value = nombre;
  document.getElementById('editPuesto').value = puesto;
  document.getElementById('editUbicacion').value = ubicacion;
  document.getElementById('modalEditar').style.display = 'flex';
}

function cerrarModal(){
  document.getElementById('modalEditar').style.display = 'none';
}

async function guardarEdicion(){
  const nombre = document.getElementById('editNombre').value;
  const perfil = document.getElementById('editPuesto').value;
  const ubicacionCodigo = document.getElementById('editUbicacion').value;
  const accesoTotalUbicaciones = perfil === 'Analista de AAFF';

  await fetch(`http://127.0.0.1:3000/usuarios/${usuarioEditando}`, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      nombre,
      puesto: accesoTotalUbicaciones ? 'ADMINISTRACION ACTIVOS FIJOS' : perfil,
      perfil,
      perfilDescripcion: '',
      ubicacionCodigo,
      ubicacionDescripcion: ubicacionCodigo,
      ubicacionOrigen: ubicacionCodigo,
      accesoTotalUbicaciones
    })
  });

  cerrarModal();
  cargarUsuarios();
}

cargarUsuarios();
</script>

</body>
</html>
