<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IBU - Inventario</title>
<link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="navbar.css">
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:'Lato',sans-serif}
body{background:#F4F4F8;color:#1A1A2E; padding-bottom:50px;}
.top-section{
  padding:0 0 60px;
  margin-top:-1px;
}

/* CREACION */
.create-card{background:#fff;margin:30px;border-radius:16px;padding:24px 30px;box-shadow:0 6px 18px rgba(0,0,0,0.08)}
.create-title{color:#4B4EFC;font-weight:700;font-size:16px}
.create-line{height:2px;background:#4B4EFC;margin:12px 0 20px;width:100%}
.create-form{display:flex;gap:12px;align-items:center}
.create-form input,.create-form select{padding:10px 12px;border:1px solid #DADAE5;border-radius:10px;background:#fff}
.create-btn{background:#2C3E6B;color:#fff;border:none;padding:10px 24px;border-radius:10px;cursor:pointer;font-weight:600;letter-spacing:0.3px}

/* TABLA */
.table-card{background:#DCDDE6;margin:30px;border-radius:16px;padding:24px 30px;box-shadow:0 6px 18px rgba(0,0,0,0.06)}
table{width:100%;border-collapse:collapse}
th{color:#4B4EFC;font-size:13px;text-align:left;padding:12px;border-bottom:2px solid #4B4EFC}
td{padding:12px;border-top:1px solid #E6E6EF;font-size:14px}
.btn-ingresar{background:#2C3E6B;color:#fff;border:none;padding:6px 14px;border-radius:8px;cursor:pointer}

/* MODAL */
.modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.3);display:none;justify-content:center;align-items:center}
.modal-content{background:#fff;width:80%;border-radius:16px;padding:24px 30px;box-shadow:0 20px 50px rgba(0,0,0,0.2)}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.close{cursor:pointer;font-weight:600}

.negative{color:#E53935}
.positive{color:#43A047}

.input-gray{
  background:#E6E6EF;
  border:none;
  padding:8px;
  border-radius:8px;
}

.footer-line{
  height:40px;
  background:#303D9F;
  width:100%;
  position:fixed;
  bottom:0;
  left:0;
}
</style>
</head>
<body>

<div id="navbar-container"></div>

<div class="create-card">
  <div class="create-title">Creación</div>
  <div class="create-line"></div>
  <div class="create-form" style="justify-content:space-between;width:100%;">
    <div style="display:flex;flex-direction:column;font-size:12px;gap:4px;">
      <label>Descripción</label>
      <input placeholder="Valor" id="desc">
    </div>

    <div style="display:flex;flex-direction:column;font-size:12px;gap:4px;">
      <label>Ubicación</label>
      <select id="ubicacion">
        <option>Seleccionar</option>
        <option>007</option><option>131</option><option>171</option><option>242</option><option>026</option>
      </select>
    </div>

    <div style="display:flex;flex-direction:column;font-size:12px;gap:4px;">
      <label>Tipo</label>
      <select id="tipo">
        <option>Seleccionar</option>
        <option>Inventario General</option>
        <option>Inventario Parcial</option>
      </select>
    </div>

    <div style="display:flex;flex-direction:column;font-size:12px;gap:4px;">
      <label>Nº Clases</label>
      <select id="clases">
        <option>Seleccionar</option>
        <option>1</option><option>2</option><option>3</option>
      </select>
    </div>

    <div style="display:flex;flex-direction:column;font-size:12px;gap:4px;">
      <label>Fecha</label>
      <input type="date" id="fecha">
    </div>

    <button class="create-btn" onclick="crear()">Crear</button>
  </div>
</div>

<div class="table-card">
<table id="tabla">
<thead>
<tr>
<th>Nº Inventario</th>
<th>Fecha <span style="font-size:10px;opacity:0.6;">▼</span></th>
<th>Dias</th>
<th>Descripción</th>
<th>Tipo <span style="font-size:10px;opacity:0.6;">▼</span></th>
<th>Ubicación <span style="font-size:10px;opacity:0.6;">▼</span></th>
<th>Cant. Clases</th>
<th>Estado <span style="font-size:10px;opacity:0.6;">▼</span></th>
<th>Acción</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>

<div class="modal" id="modal">
  <div class="modal-content">

    <div class="modal-header">
      <div style="display:flex;gap:30px;font-size:14px;">
        <div><b>Fecha:</b> 20/11/2025</div>
        <div><b>N° Inventario:</b> 1</div>
        <div><b>Descripción:</b> Inv. General Noviembre</div>
      </div>
      <div style="display:flex;gap:10px;align-items:center;">
        <button style="background:#E6E6EF;border:none;padding:6px 12px;border-radius:8px;cursor:pointer;">Cancelar Inventario</button>
        <span class="close" onclick="cerrar()">X</span>
      </div>
    </div>

    <table>
      <thead>
        <tr>
          <th>N° Clase</th>
          <th>Descripción</th>
          <th>Teórico</th>
          <th>Físico Apto</th>
          <th>Físico No Apto</th>
          <th>Diferencia</th>
          <th>N° Baja</th>
          <th>N° Alta</th>
          <th>Observaciones</th>
        </tr>
      </thead>
      <tbody id="detalleBody"></tbody>
    </table>

    <div style="display:flex;justify-content:space-between;margin-top:20px;">
      <div style="display:flex;flex-direction:column;gap:10px;width:45%;">
        <label>Gerente / Resp a Cargo</label>
        <input class="input-gray">
        <label>Participante</label>
        <input class="input-gray">
      </div>

      <div style="display:flex;flex-direction:column;gap:10px;width:45%;">
        <label>Administrativo</label>
        <input class="input-gray">
        <label>Participante</label>
        <input class="input-gray">
      </div>
    </div>

    <div style="display:flex;justify-content:center;gap:20px;margin-top:20px;">
      <button style="background:#6C5CE7;color:#fff;border:none;padding:10px 20px;border-radius:10px;">Guardar Borrador</button>
      <button style="background:#2C3E6B;color:#fff;border:none;padding:10px 20px;border-radius:10px;">Conciliar</button>
    </div>

  </div>
</div>

<script>
function goInicio(){
  window.location.href = "dashboard.html";
}
function goProrrogas(){
  window.location.href = "prorrogas.html";
}
function goUsuarios(){
  window.location.href = "usuarios.html";
}
function goReportes(){
  window.location.href = "reportes.html";
}
const data=[
{n:1,fecha:'20/11/2025',dias:20,desc:'Inv. General Noviembre',tipo:'Inventario General',ubi:'007',clases:6},
{n:2,fecha:'21/11/2025',dias:1,desc:'Inventario PDA',tipo:'Inventario Parcial',ubi:'007',clases:2},
{n:4,fecha:'20/11/2025',dias:2,desc:'Inv. General Noviembre',tipo:'Inventario General',ubi:'131',clases:6},
{n:87,fecha:'20/11/1996',dias:56,desc:'Inv. General Noviembre',tipo:'Inventario General',ubi:'171',clases:3},
{n:9,fecha:'20/11/1996',dias:78,desc:'Inv. General Noviembre',tipo:'Inventario General',ubi:'242',clases:5},
{n:123,fecha:'20/11/1996',dias:52,desc:'Inv. General Noviembre',tipo:'Inventario General',ubi:'026',clases:2}
];

function render(){
const tbody=document.querySelector('#tabla tbody');
tbody.innerHTML='';
data.forEach(d=>{
const tr=document.createElement('tr');
tr.innerHTML=`<td>${d.n}</td><td>${d.fecha}</td><td>${d.dias}</td><td>${d.desc}</td><td>${d.tipo}</td><td>${d.ubi}</td><td>${d.clases}</td><td>Pendiente</td><td><button class="btn-ingresar" onclick="abrir()">Ingresar</button></td>`;
tbody.appendChild(tr);
});
}

function crear(){
data.push({n:data.length+1,fecha:'Hoy',dias:0,desc:document.getElementById('desc').value,tipo:'General',ubi:'007',clases:1});
render();
}

const detalleData=[
{clase:1,desc:'Changos',teo:300},
{clase:2,desc:'Monitor',teo:50},
{clase:3,desc:'PDA',teo:20},
{clase:65,desc:'Teclados',teo:10},
{clase:78,desc:'Notebook',teo:2},
{clase:85,desc:'Celular',teo:5}
];

function renderDetalle(){
  const tbody=document.getElementById('detalleBody');
  tbody.innerHTML='';

  detalleData.forEach((d,i)=>{
    const tr=document.createElement('tr');

    tr.innerHTML=`
      <td>${d.clase}</td>
      <td>${d.desc}</td>
      <td><input class="input-gray" type="number" oninput="calcular(${i})" id="teo${i}" value="${d.teo}"></td>
      <td><input class="input-gray" type="number" oninput="calcular(${i})" id="apto${i}"></td>
      <td><input class="input-gray" type="number" oninput="calcular(${i})" id="noapto${i}"></td>
      <td id="dif${i}">0</td>
      <td><input class="input-gray"></td>
      <td><input class="input-gray"></td>
      <td><input class="input-gray"></td>
    `;

    tbody.appendChild(tr);
  });
}

function calcular(i){
  const apto=parseInt(document.getElementById(`apto${i}`).value)||0;
  const noapto=parseInt(document.getElementById(`noapto${i}`).value)||0;
  const teo=parseInt(document.getElementById(`teo${i}`).value)||0;

  const diff=(apto+noapto)-teo;

  const cell=document.getElementById(`dif${i}`);
  cell.innerText=diff;

  cell.className='';
  if(diff>0) cell.classList.add('positive');
  if(diff<0) cell.classList.add('negative');
}

function abrir(){
  document.getElementById('modal').style.display='flex';
  renderDetalle();
}
function cerrar(){document.getElementById('modal').style.display='none'}

render();
</script>

<div class="footer-line"></div>
<script src="navbar.js"></script>
<script>
  cargarUsuario('inventario');
</script>
</body>
</html>
